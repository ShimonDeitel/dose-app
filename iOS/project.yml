name: DoseMedTracker
options:
  bundleIdPrefix: com.shimondeitel.dosetrack
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  DoseMedTracker:
    type: application
    platform: iOS
    sources:
      - path: DoseMedTracker
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.dosetrack
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: DoseMedTracker/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  DoseMedTrackerTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: DoseMedTrackerTests
      - path: DoseMedTracker.storekit
    dependencies:
      - target: DoseMedTracker
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.dosetrack.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  DoseMedTrackerUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: DoseMedTrackerUITests
    dependencies:
      - target: DoseMedTracker
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.dosetrack.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  DoseMedTracker:
    build:
      targets:
        DoseMedTracker: all
        DoseMedTrackerTests: [test]
        DoseMedTrackerUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: DoseMedTracker.storekit
    test:
      config: Debug
      storeKitConfiguration: DoseMedTracker.storekit
      targets:
        - DoseMedTrackerTests
        - DoseMedTrackerUITests
    archive:
      config: Release
